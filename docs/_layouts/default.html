        <script>
            // --- MOBILE NAV LOGIC ---
            const hamburger = document.getElementById('hamburger');
            const navLinks = document.getElementById('nav-links');
            hamburger.addEventListener('click', () => navLinks.classList.toggle('modal-open'));
            document.querySelectorAll('.nav-links a').forEach(link => link.addEventListener('click', () => navLinks.classList.remove('modal-open')));

            // --- ACCESSIBLE TABS LOGIC (From your snippet) ---
            window.addEventListener("load", () => {
                document.querySelectorAll(".tabs").forEach(e => {
                    const t = e.querySelector("ul");
                    if (!t) return;
                    const n = t.querySelectorAll("a"),
                        i = e.querySelectorAll('[id^="section"]'),
                        s = (e, t) => {
                            t.focus();
                            t.removeAttribute("tabindex");
                            t.setAttribute("aria-selected", "true");
                            e.removeAttribute("aria-selected");
                            e.setAttribute("tabindex", "-1");
                            const s = Array.prototype.indexOf.call(n, t),
                                    o = Array.prototype.indexOf.call(n, e);
                            i[o].hidden = !0;
                            i[s].hidden = !1;
                        };
                    t.setAttribute("role", "tablist");
                    n.forEach((e, o) => {
                        e.setAttribute("role", "tab");
                        e.setAttribute("tabindex", "-1");
                        e.parentNode.setAttribute("role", "presentation");
                        e.addEventListener("click", ev => {
                            ev.preventDefault();
                            const activeTab = t.querySelector("[aria-selected]");
                            activeTab && ev.currentTarget !== activeTab && s(activeTab, ev.currentTarget);
                        });
                        e.addEventListener("keydown", ev => {
                            const idx = Array.prototype.indexOf.call(n, ev.currentTarget),
                                r = ["ArrowLeft", "Left"].includes(ev.key) ? idx - 1 : ["ArrowRight", "Right"].includes(ev.key) ? idx + 1 : ["ArrowDown", "Down"].includes(ev.key) ? "down" : null;
                            if (null !== r) {
                                ev.preventDefault();
                                "down" === r ? i[o].focus() : n[r] && s(ev.currentTarget, n[r]);
                            }
                        });
                    });
                    i.forEach((e, t) => {
                        e.setAttribute("role", "tabpanel");
                        e.setAttribute("tabindex", "-1");
                        e.setAttribute("aria-label", n[t].innerText);
                        e.hidden = !0;
                    });
                    n[0].removeAttribute("tabindex");
                    n[0].setAttribute("aria-selected", "true");
                    i[0].hidden = !1;
                });
            });

            // --- NEW MODAL LOGIC ---
            function openModal(modalId) {
                const m = document.getElementById(modalId);
                m.style.display = 'block';
                setTimeout(() => m.classList.add('show'), 10); // Slight delay for fade transition
            }

            function closeModal() {
                document.querySelectorAll('.modal').forEach(m => {
                    m.classList.remove('show');
                    setTimeout(() => m.style.display = 'none', 300); // Wait for fade out
                });
            }

            const yesBtn = document.getElementById('yesFeedback');
            const noBtn = document.getElementById('noFeedback');
            if(yesBtn) yesBtn.addEventListener('click', () => openModal('yesModal'));
            if(noBtn) noBtn.addEventListener('click', () => openModal('noModal'));
            
            document.querySelectorAll('.close-modal').forEach(btn => btn.addEventListener('click', closeModal));
            window.addEventListener('click', (e) => { if (e.target.classList.contains('modal')) closeModal(); });

            // --- BACK TO TOP BUTTON ---
            const btt = document.getElementById('backToTop');

            window.addEventListener('scroll', () => { 
                // Checks how far down the page is scrolled
                const scrollPosition = window.scrollY || document.documentElement.scrollTop;
                
                if (scrollPosition > 300) {
                    btt.style.display = 'flex';
                } else {
                    btt.style.display = 'none';
                }
            });

            btt.addEventListener('click', () => { 
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            });
        </script>
